name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer binary
        run: bun run build:installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opentack-install-${{ matrix.os }}
          path: dist/opentack-install*

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: opentack-install-*
          merge-multiple: true

      - name: Rename binaries with platform suffix
        shell: bash
        run: |
          mv opentack-install      opentack-install-linux   || true
          mv opentack-install.exe  opentack-install-windows.exe || true
          mv opentack-install-*    opentack-install-macos   || true

      - uses: softprops/action-gh-release@v2
        with:
          files: opentack-install-*
          generate_release_notes: true
